<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Monblan Project</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Roboto:wght@400;500;700&display=swap"
		rel="stylesheet">

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
	<link rel="stylesheet" href="css/styles.css">
</head>

<body>
	<div class="main-bg-decor"></div>

	<header class="header">
		<div class="header-container">
			<div class="avatar-inner">
				<div class="avatar">
					<img class="avatar-img" src="img/logo.svg" alt="">
				</div>
			</div>

			<div class="profile-content">

				<div class="profile-title-inner">
					<h1 class="profile-name">monblanproject</h1>
					<span class="date-start">Start on 17-02-2016</span>
				</div>

				<ul class="profile-stats-list">
					<li><span class="stats-item">870</span> posts</li>
					<li><span class="stats-item">11,787</span> followers</li>
					<li><span class="stats-item">112</span> following</li>
				</ul>

				<div class="profile-filter">
					<span class="filter-label">Date</span>

					<div class="datepicker-inner">
						<div class="date-compound-input" id="picker-from-wrapper">
							<input type="text" id="date-from" placeholder="from" readonly>
							<button type="button" class="btn-clear" id="clear-from" title="Clear">
								<img src="img/close.svg" alt="✕">
							</button>
							<button type="button" class="btn-calendar" id="trigger-from" title="Open calendar">
								<img src="img/calendar.svg" alt="📅">
							</button>
						</div>
					</div>

					<div class="date-compound-input" id="picker-to-wrapper">
						<input type="text" id="date-to" placeholder="to" readonly>
						<button type="button" class="btn-clear" id="clear-to" title="Clear">
							<img src="img/close.svg" alt="✕">
						</button>
						<button type="button" class="btn-calendar" id="trigger-to" title="Open calendar">
							<img src="img/calendar.svg" alt="calendar">
						</button>
					</div>
				</div>
			</div>
		</div>
	</header>

	<main class="main-content">
		<div class="view-options-bar">
			<div class="btn-view">
				<button id="btn-tiles" class="toggle-btn" title="Tiles View">
					<img src="img/grid.svg" alt="Tiles">
				</button>
				<button id="btn-rows" class="toggle-btn active" title="Rows View">
					<img src="img/rows.svg" alt="Rows">
				</button>
			</div>
		</div>

		<div id="main-container" class="view-rows"></div>

		<div class="bottom-bg-decor"></div>

		<div class="load-more">
			<button id="load-more-btn" class="load-more-bnt">LOAD MORE</button>
		</div>

	</main>

	<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
	<script src="js/main.js" type="module"></script>
</body>

</html>
